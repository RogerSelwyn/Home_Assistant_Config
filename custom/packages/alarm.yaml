template: 
  - alarm_control_panel:
    - name: Texecom
      unique_id: texecom
      code_arm_required: False
      code_format: no_code
      state: >
        {% if is_state('binary_sensor.alarm', 'on') %}
          triggered
        {% elif is_state('binary_sensor.armed', 'on') %}
          armed_home
        {% else %}
          disarmed
        {% endif %}
      arm_home:
        service: switch.turn_on
        target:
          entity_id: switch.texecom_part_arm
      disarm:
        service: switch.turn_off
        target:
          entity_id: switch.texecom_part_arm

