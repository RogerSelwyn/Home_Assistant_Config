mqtt_discoverystream_alt:
  - base_topic: themews
    discovery_topic: themews-discovery
    command_topic: themews-command
    remote_status: 
      topic: tyrcelyn/status
    local_status: 
      topic: themews/status
    publish_attributes: false
    publish_timestamps: false
    publish_discovery: true
