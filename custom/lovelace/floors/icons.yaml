- entities: 
    - alarm_control_panel.texecom
  state_action:
    - action: call-service
      service: floorplan.class_set
      service_data: 'alarm alarm-${entity.state}'

- element: switch.plug_box_room
  entities:
    - switch.plug_box_room
  state_action:
    - action: call-service
      service: floorplan.class_set
      service_data: |
        >
        let status = entities['switch.plug_box_room'].state
        if (entities['switch.plug_box_room'].attributes.status.mode === "override")
          {
            status = "boost"
          } 
        return `plug plug-${status}`

