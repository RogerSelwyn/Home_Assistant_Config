# Icons *******************************************

- element: camera.front_door_high
  entities: 
    - binary_sensor.front_door_object_detected
    - binary_sensor.front_door_person_detected
    - camera.front_door_high
  state_action:
    - action: call-service
      service: floorplan.class_set
      service_data: |
        >
        let status = entities['camera.front_door_high'].state
        if (entities['camera.front_door_high'].state === "unavailable")
          {
            status = "disarmed"
          } else if (entities['binary_sensor.front_door_person_detected'].state === "on")
          {
            status = "person"
          } else if (entities['binary_sensor.front_door_object_detected'].state === "on")
          {
            status = "object"
          }
        return `camera camera-${status}`


